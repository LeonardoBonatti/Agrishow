<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sotreq - Login</title>
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFCC09">
    <link rel="apple-touch-icon" href="./img/icon-192.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--black);
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
        }

        /* Diagonal warning stripes in background */
        .login-bg-stripes {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                45deg,
                #111,
                #111 20px,
                #000 20px,
                #000 40px
            );
            opacity: 0.5;
            z-index: 1;
        }

        .login-box {
            background-color: var(--white);
            width: 100%;
            max-width: 400px;
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            z-index: 10;
            position: relative;
            border-top: 6px solid var(--cat-yellow);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1rem;
        }
        
        .login-logo .cat-logo-box {
            font-size: 1.4rem;
            padding: 6px 14px;
            box-shadow: var(--shadow-md);
        }

        .login-logo .sotreq-text {
            color: var(--black);
            font-size: 1.5rem;
        }

        .login-title {
            font-weight: 700;
            color: var(--dark-grey);
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            background-color: var(--bg-color);
            border: 2px solid var(--border-grey);
            border-radius: var(--radius-sm);
            padding: 0.875rem 1rem;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.2s ease;
            outline: none;
            font-family: inherit;
        }

        .form-input:focus {
            border-color: var(--cat-yellow);
            box-shadow: 0 0 0 3px rgba(255, 204, 9, 0.2);
            background-color: var(--white);
        }

        .login-btn {
            width: 100%;
            background-color: var(--cat-yellow);
            color: var(--black);
            font-weight: 800;
            font-size: 1.1rem;
            padding: 1rem;
            border-radius: var(--radius-sm);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: var(--shadow-md);
            margin-top: 0.5rem;
            transition: transform 0.1s ease, background-color 0.2s ease;
        }

        .login-btn:active {
            transform: scale(0.98);
            background-color: var(--cat-yellow-hover);
        }

        .security-notice {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>
<body class="login-page">
    <div class="login-bg-stripes"></div>

    <div class="login-box">
        <div class="login-header">
            <div class="login-logo">
                <span class="sotreq-text">Sotreq</span>
                <span class="cat-logo-box">CAT</span>
            </div>
            <h1 class="login-title">Acesso Restrito ao Catálogo</h1>
        </div>

        <form id="fakeLoginForm">
            <div class="form-group">
                <label class="form-label" for="matricula">Matrícula</label>
                <input type="text" id="matricula" class="form-input" placeholder="Digite sua matrícula Sotreq" required autocomplete="off">
            </div>

            <div class="form-group">
                <label class="form-label" for="senha">Senha</label>
                <input type="password" id="senha" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Entrar</button>
        </form>

        <div class="security-notice">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Acesso exclusivo para força de vendas Agrishow
        </div>
    </div>

    <!-- Scripts -->
    <script>
        document.getElementById('fakeLoginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent page reload
            const btn = document.querySelector('.login-btn');
            
            // Loading effect
            btn.textContent = 'Autenticando...';
            btn.style.opacity = '0.8';

            // Fake delay of 800ms
            setTimeout(() => {
                // Add a "token" to prevent endless redirect loops
                sessionStorage.setItem('sotreq_temp_auth', 'true');
                window.location.href = 'index.html';
            }, 800);
        });

        // Registrar Service Worker (for PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .catch((err) => console.log('Falha no ServiceWorker:', err));
            });
        }
    </script>
</body>
</html>
